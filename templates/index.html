<!DOCTYPE html>
<html>
<head>
    <title>Social Media Sentiment Analysis</title>
</head>
<body>

    <h1>Social Media Sentiment Analysis</h1>

    <form method="POST">
        <textarea name="tweet" rows="5" cols="50"
            placeholder="Enter a tweet"></textarea>
        <br><br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <h2>Result</h2>

        <p><b>Tweet:</b> {{ result.text }}</p>
        <p><b>Sentiment:</b> {{ result.label }}</p>
        <p><b>Confidence:</b> {{ result.score }}%</p>
    {% endif %}

</body>
</html>
